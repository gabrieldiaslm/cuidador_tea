{% load static %}
{% load pwa %} <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Cuidador TEA</title>
    
    {% progressive_web_app_meta %}
    
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <main class="container">
        {% block content %}
        {% endblock %}
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const infoButtons = document.querySelectorAll('.info-btn');
            
            const allInfoTexts = document.querySelectorAll('.info-text');

            infoButtons.forEach(button => {
                button.addEventListener('click', function() {
                    const targetId = this.dataset.target;
                    const targetText = document.getElementById(targetId);

                    const isCurrentlyVisible = !targetText.classList.contains('hidden');

                    allInfoTexts.forEach(text => {
                        text.classList.add('hidden');
                    });

                    if (!isCurrentlyVisible) {
                        targetText.classList.remove('hidden');
                    }
                });
            });
        });

        async function syncOfflineData() {
            const queue = JSON.parse(localStorage.getItem('offline_evaluations') || '[]');
            
            if (queue.length === 0) return;

            console.log(`Sincronizando ${queue.length} avaliações pendentes...`);

            for (const data of queue) {
                try {
                    const response = await fetch("{% url 'sync_assessment' %}", {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': '{{ csrf_token }}' 
                        },
                        body: JSON.stringify(data)
                    });

                    if (response.ok) {
                        console.log('Avaliação sincronizada com sucesso!');
                    }
                } catch (error) {
                    console.error('Erro ao sincronizar:', error);
                }
            }

            // Limpa a fila após tentar sincronizar tudo
            localStorage.removeItem('offline_evaluations');
            alert('Sucesso! As suas avaliações feitas offline foram sincronizadas.');
        }

        window.addEventListener('online', syncOfflineData);

        window.addEventListener('load', () => {
            if (navigator.onLine) syncOfflineData();
        });
    </script>
</body>
</html>
