{% extends "core/base.html" %}

{% block content %}
<div class="offline-container" style="text-align: center; padding: 50px 20px; margin-top: 50px;">
    <h1 style="font-size: 5rem; margin-bottom: 20px;">📡</h1>
    <h2 style="color: var(--cor-texto);">Ops! Você está sem conexão</h2>
    <p style="color: #666; font-size: 1.1em; margin-bottom: 30px;">
        O Cuidador TEA precisa de internet para sincronizar e salvar as suas avaliações.
    </p>
    
    <div style="background-color: #f8f9fa; padding: 15px; border-radius: 8px; display: inline-block; margin-bottom: 30px;">
        💡 <strong>Dica:</strong> Verifique o seu Wi-Fi ou os dados móveis.
    </div>
    <br>
    
    <button onclick="window.location.reload();" class="button" style="padding: 12px 30px; font-size: 1.1em;">
        Tentar Novamente
    </button>
</div>
{% endblock %}
